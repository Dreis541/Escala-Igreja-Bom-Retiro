<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Bom Retiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #1e3a8a; color: #1e3a8a; font-weight: 700; }
    </style>
</head>
<body class="pb-10">
    <header class="bg-[#1e3a8a] text-white py-6 px-4 shadow-lg">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <img src="applogopbr.png" alt="Logo PBR" class="h-16 w-16 rounded-full object-cover border-2 border-white/30 shadow-sm">
            
            <div class="flex flex-col">
                <h1 class="text-xl font-bold uppercase tracking-tight leading-tight">Escala Bom Retiro</h1>
                <p class="text-blue-200 text-xs font-medium uppercase tracking-widest mt-1">Promessa Bom Retiro</p>
            </div>
        </div>
    </header>
    <nav class="flex bg-white shadow-sm sticky top-0 z-10 text-sm">
        <button onclick="switchTab('saturday')" id="tab-saturday" class="flex-1 py-4 tab-active">SÁBADOS</button>
        <button onclick="switchTab('sunday')" id="tab-sunday" class="flex-1 py-4 text-gray-500">DOMINGOS</button>
    </nav>

    <main class="max-w-md mx-auto mt-6 px-4">
        <div id="loader" class="text-center py-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-900 mx-auto"></div></div>
        <div id="cards-container" class="space-y-6"></div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLqbLJ6Yu4pnndPZYW8GAi2M3ji569gTCVXvHcZnpEZofRXqpz_1BMrOrGSLt9yiKkugPChdFEYsFO/pub?gid=1379906472&single=true&output=csv"; 
        const ADMIN_PHONE = "55119998745605"; 

        let currentTab = 'saturday';
        let fullData = [];

        async function init() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    fullData = results.data;
                    renderScale();
                }
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-saturday').className = tab === 'saturday' ? 'flex-1 py-4 tab-active' : 'flex-1 py-4 text-gray-500';
            document.getElementById('tab-sunday').className = tab === 'sunday' ? 'flex-1 py-4 tab-active' : 'flex-1 py-4 text-gray-500';
            renderScale();
        }

        function renderScale() {
            const container = document.getElementById('cards-container');
            document.getElementById('loader').style.display = 'none';
            container.innerHTML = '';
            
            // Filtra apenas as chaves que são datas reais (ignora "Função")
            const allKeys = Object.keys(fullData[0] || {});
            const allDates = allKeys.filter(k => k.includes("/"));

            allDates.forEach(dateStr => {
                const p = dateStr.split("/");
                const dateObj = new Date(p[2], p[1]-1, p[0]);
                const day = dateObj.getDay(); 
                if ((currentTab === 'saturday' && day === 6) || (currentTab === 'sunday' && day === 0)) {
                    container.appendChild(createCard(dateStr, currentTab));
                }
            });
        }

        function createCard(date, type) {
            const div = document.createElement('div');
            div.className = "bg-white rounded-xl overflow-hidden shadow-md border border-gray-100";
            let rowsHtml = '';
            
            // Usamos as 5 primeiras linhas (Recepção até Escala Pastoral)
            fullData.slice(0, 5).forEach(row => {
                const f = row["Função"];
                const v = row[date] || "A definir";
                if (type === 'sunday' && f === "Escola Bíblica") return;
                
                rowsHtml += `<div class="flex items-center justify-between p-4 border-b last:border-0 text-sm">
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">${f}</p><p class="font-semibold text-gray-800">${v}</p></div>
                    <button onclick="confirmar('${v}','${f}','${date}')" class="text-green-600 p-2"><i class="fab fa-whatsapp text-lg"></i></button>
                </div>`;
            });
            
            div.innerHTML = `<div class="${type==='saturday'?'bg-blue-800':'bg-blue-600'} p-3 text-white font-bold flex justify-between">
                <span>${date}</span>
                <span class="text-[10px] opacity-75 uppercase">${type==='saturday'?'Sábado':'Domingo'}</span>
            </div><div>${rowsHtml}</div>`;
            return div;
        }

        function confirmar(n, f, d) {
            if (n === "A definir") return;
            const msg = window.encodeURIComponent(`Olá! Confirmo minha escala: ${f} em ${d}.`);
            window.open(`https://wa.me/${ADMIN_PHONE}?text=${msg}`, '_blank');
        }
        init();
    </script>
</body>
</html>
